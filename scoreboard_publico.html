<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scoreboard — Pantalla Publica</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700;900&family=Inter:wght@500;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            font-family: 'Inter', sans-serif;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .fs-btn {
            position: fixed;
            top: 14px;
            right: 14px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 5;
            line-height: 0;
        }

        .fs-btn:hover {
            color: #000;
            background: #fff;
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .fin-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px;
            text-align: center;
            font-size: clamp(14px, 2vw, 22px);
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            z-index: 10;
            display: none;
            background: #000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .fin-banner.show {
            display: block;
        }

        .board {
            width: 100%;
            max-width: 1900px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            padding: 0;
        }

        .side {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2vw 0;
            gap: 4vh;
        }

        .fighter-name {
            font-size: clamp(22px, 3.5vw, 42px);
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            text-align: center;
        }

        .side.r .fighter-name {
            text-shadow: 0 0 12px rgba(255, 0, 60, 0.4);
        }

        .side.b .fighter-name {
            text-shadow: 0 0 12px rgba(0, 136, 255, 0.4);
        }

        .score-box {
            width: clamp(300px, 28vw, 500px);
            height: clamp(280px, 24vw, 420px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(280px, 22vw, 460px);
            line-height: 0.82;
            font-weight: 900;
            color: #fff;
            transition: transform 0.15s ease, box-shadow 0.3s ease;
            background: #000;
        }

        .score-box.bump {
            transform: scale(1.08);
        }

        .side.r .score-box {
            color: #fff;
            border: 2px solid #ff003c;
            box-shadow: inset 0 0 80px rgba(255, 0, 60, 0.45), 0 0 60px rgba(255, 0, 60, 0.45);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            background: rgba(255, 0, 60, 0.30);
        }

        .side.b .score-box {
            color: #fff;
            border: 2px solid #0088ff;
            box-shadow: inset 0 0 80px rgba(0, 136, 255, 0.45), 0 0 60px rgba(0, 136, 255, 0.45);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            background: rgba(0, 136, 255, 0.30);
        }

        .side.r .score-box.winner {
            animation: neon-red 0.9s infinite alternate;
        }

        .side.b .score-box.winner {
            animation: neon-blue 0.9s infinite alternate;
        }

        @keyframes neon-red {
            from {
                box-shadow: inset 0 0 40px rgba(255, 0, 60, 0.1), 0 0 20px rgba(255, 0, 60, 0.3);
            }

            to {
                box-shadow: inset 0 0 40px rgba(255, 0, 60, 0.2), 0 0 50px rgba(255, 0, 60, 0.7), 0 0 100px rgba(255, 0, 60, 0.3);
                border-color: #ff3366;
            }
        }

        @keyframes neon-blue {
            from {
                box-shadow: inset 0 0 40px rgba(0, 136, 255, 0.1), 0 0 20px rgba(0, 136, 255, 0.3);
            }

            to {
                box-shadow: inset 0 0 40px rgba(0, 136, 255, 0.2), 0 0 50px rgba(0, 136, 255, 0.7), 0 0 100px rgba(0, 136, 255, 0.3);
                border-color: #33aaff;
            }
        }

        .side.r .score-box.loser {
            opacity: 1;
        }

        .side.b .score-box.loser {
            opacity: 1;
        }

        .warn-row {
            display: flex;
            gap: clamp(10px, 1.5vw, 18px);
        }

        .warn-circle {
            width: clamp(24px, 3vw, 40px);
            height: clamp(24px, 3vw, 40px);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
            background: transparent;
        }

        .side.r .warn-circle.on {
            background: #f5c400;
            border-color: #f5c400;
            box-shadow: 0 0 24px rgba(245, 196, 0, 0.8);
        }

        .side.b .warn-circle.on {
            background: #f5c400;
            border-color: #f5c400;
            box-shadow: 0 0 24px rgba(245, 196, 0, 0.8);
        }

        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 1.5vh;
            min-width: clamp(260px, 28vw, 460px);
            padding-top: 2vw;
        }

        .period-tag {
            display: none;
        }

        .clock {
            height: clamp(280px, 24vw, 420px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(130px, 20.8vw, 260px);
            font-weight: 900;
            letter-spacing: 6px;
            line-height: 1;
            color: #fff;
            border-radius: 8px;
            padding: 0 8px;
        }

        .clock.halftime {
            background: #ffffff;
            color: #000000;
        }

        .clock.centi-long {
            font-size: clamp(85px, 13.5vw, 170px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1a1a1a;
            transition: background 0.3s;
        }

        .status-dot.running {
            background: #00ff5b;
            box-shadow: 0 0 12px rgba(0, 255, 91, 0.6);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.2
            }
        }

        /* DESCANSO OVERLAY */
        .descanso-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 15;
            backdrop-filter: blur(8px);
        }

        .descanso-overlay.show {
            display: flex;
        }

        .ds-ov-label {
            font-size: clamp(20px, 3vw, 36px);
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fff;
            transition: color 0.4s;
        }

        .ds-ov-label.active {
            color: #fff;
            text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
        }

        .ds-ov-clock {
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(160px, 32vw, 400px);
            font-weight: 900;
            color: rgba(108, 45, 45, 0.05);
            letter-spacing: 6px;
            line-height: 1;
            transition: color 0.4s, text-shadow 0.4s;
        }

        .ds-ov-clock.active {
            color: #fff;
            text-shadow: 0 0 60px rgba(255, 255, 255, 0.5);
        }

        /* ACTIVITY TIME — always reserves space, score-box stays fixed */
        .activity-tag {
            background: transparent;
            border-radius: 8px;
            padding: 10px 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .activity-tag.show {
            visibility: visible;
            opacity: 1;
            background: #f5c400;
        }

        .activity-tag.paused {
            visibility: visible;
            opacity: 0.55;
            background: #f5c400;
        }

        .act-ov-clock {
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(56px, 10vw, 120px);
            font-weight: 900;
            color: #000;
            line-height: 1;
            letter-spacing: 4px;
        }



        /* NO SIGNAL */
        .no-signal {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
            z-index: 20;
        }

        .no-signal p {
            color: #333;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .bounce {
            display: flex;
            gap: 6px;
        }

        .bounce span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #222;
            animation: b 1.2s infinite;
        }

        .bounce span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .bounce span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes b {

            0%,
            100% {
                transform: translateY(0);
                box-shadow: none;
            }

            50% {
                transform: translateY(-7px);
                background: #fff;
                box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
            }
        }

        /* ── LARGE SCREENS / TV ── */
        @media (min-width: 1600px) {
            .board {
                max-width: 100%;
                padding: 0 3vw;
            }

            .score-box {
                width: clamp(500px, 28vw, 780px);
                height: clamp(440px, 24vw, 680px);
                font-size: clamp(440px, 22vw, 740px);
            }

            .center {
                min-width: clamp(420px, 26vw, 680px);
            }

            .clock {
                font-size: clamp(234px, 20.8vw, 390px);
            }

            .clock.centi-long {
                font-size: clamp(152px, 13.5vw, 254px);
            }

            .fighter-name {
                font-size: clamp(36px, 3.5vw, 64px);
            }

            .warn-circle {
                width: clamp(36px, 2.8vw, 56px);
                height: clamp(36px, 2.8vw, 56px);
            }

            .act-ov-clock {
                font-size: clamp(100px, 12vw, 200px);
            }

            .activity-tag {
                padding: 14px 56px;
                border-radius: 12px;
            }
        }

        /* ── 4K TV ── */
        @media (min-width: 2400px) {
            .score-box {
                width: clamp(780px, 26vw, 1200px);
                height: clamp(680px, 22vw, 1060px);
                font-size: clamp(680px, 20vw, 1100px);
            }

            .center {
                min-width: clamp(680px, 24vw, 1100px);
            }

            .clock {
                font-size: clamp(338px, 18.2vw, 624px);
            }

            .clock.centi-long {
                font-size: clamp(220px, 11.8vw, 406px);
            }

            .fighter-name {
                font-size: clamp(52px, 3.2vw, 90px);
            }

            .warn-circle {
                width: clamp(52px, 2.4vw, 80px);
                height: clamp(52px, 2.4vw, 80px);
            }

            .act-ov-clock {
                font-size: clamp(160px, 10vw, 320px);
            }

            .activity-tag {
                padding: 20px 80px;
            }

            .ds-ov-clock {
                font-size: clamp(280px, 28vw, 600px);
            }
        }

        @media (max-width: 900px) {
            .score-box {
                width: clamp(180px, 22vw, 340px);
                height: clamp(160px, 18vw, 280px);
                font-size: clamp(160px, 18vw, 320px);
            }

            .center {
                min-width: clamp(180px, 22vw, 340px);
            }

            .clock {
                height: clamp(160px, 18vw, 280px);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: clamp(94px, 15.6vw, 195px);
            }

            .clock.centi-long {
                font-size: clamp(61px, 10vw, 127px);
            }
        }


        @media (max-width: 600px) {
            .board {
                grid-template-columns: 1fr;
                padding: 16px;
                gap: 12px;
            }

            .center {
                order: -1;
                min-width: unset;
                width: 100%;
                padding-top: 2vw;
                justify-content: center;
            }

            .side {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                width: 100%;
                padding: 12px 16px;
                gap: 2vw;
            }

            .score-box {
                width: clamp(110px, 28vw, 180px);
                height: clamp(90px, 22vw, 150px);
                font-size: clamp(90px, 22vw, 160px);
            }

            .clock {
                height: clamp(90px, 22vw, 150px);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: clamp(62px, 18.2vw, 130px);
            }

            .clock.centi-long {
                font-size: clamp(40px, 11.8vw, 85px);
            }

            .activity-tag {
                padding: 8px 18px;
            }

            .act-ov-clock {
                font-size: clamp(36px, 8vw, 72px);
            }
        }

        @media (max-width: 400px) {
            .score-box {
                width: clamp(80px, 24vw, 120px);
                height: clamp(70px, 18vw, 100px);
                font-size: clamp(70px, 18vw, 110px);
            }

            .clock {
                height: clamp(70px, 18vw, 100px);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: clamp(47px, 15.6vw, 94px);
            }

            .clock.centi-long {
                font-size: clamp(30px, 10vw, 61px);
            }

            .fighter-name {
                font-size: clamp(14px, 4vw, 24px);
            }
        }
    </style>
</head>

<body>

    <div class="no-signal" id="no-signal">
        <p>Esperando senal</p>
        <div class="bounce"><span></span><span></span><span></span></div>
    </div>

    <!-- Overlay de descanso entre periodos -->
    <div class="descanso-overlay" id="descanso-overlay">
        <span class="ds-ov-label" id="ds-ov-label">Fin del periodo</span>
        <div class="ds-ov-clock" id="ds-ov-clock"></div>
    </div>

    <!-- Banner sutil de fin de combate (encima del marcador) -->


    <button class="fs-btn" id="fs-btn" onclick="toggleFullscreen()" title="Pantalla completa">
        <!-- icono expandir -->
        <svg id="icon-expand" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9" />
            <polyline points="9 21 3 21 3 15" />
            <line x1="21" y1="3" x2="14" y2="10" />
            <line x1="3" y1="21" x2="10" y2="14" />
        </svg>
        <!-- icono comprimir -->
        <svg id="icon-compress" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="display:none">
            <polyline points="4 14 10 14 10 20" />
            <polyline points="20 10 14 10 14 4" />
            <line x1="10" y1="14" x2="3" y2="21" />
            <line x1="21" y1="3" x2="14" y2="10" />
        </svg>
    </button>

    <div class="board">
        <div class="side r">
            <div class="score-box" id="pub-score-red">0</div>
            <div class="warn-row" id="pub-warns-red">
                <div class="warn-circle"></div>
                <div class="warn-circle"></div>
                <div class="warn-circle"></div>
            </div>
            <div class="activity-tag" id="activity-tag-red">
                <div class="act-ov-clock" id="act-ov-clock-red">0:30</div>
            </div>
        </div>

        <div class="center">
            <span class="period-tag" id="pub-period">Periodo 1</span>
            <div class="clock paused" id="pub-clock">0:00</div>
            <div class="status-dot" id="pub-dot"></div>
        </div>

        <div class="side b">
            <div class="score-box" id="pub-score-blue">0</div>
            <div class="warn-row" id="pub-warns-blue">
                <div class="warn-circle"></div>
                <div class="warn-circle"></div>
                <div class="warn-circle"></div>
            </div>
            <div class="activity-tag" id="activity-tag-blue">
                <div class="act-ov-clock" id="act-ov-clock-blue">0:30</div>
            </div>
        </div>
    </div>

    <script>
        let lastTs = 0, prevRed = -1, prevBlue = -1;
        let rafId = null;

        function formatPubTime(s) {
            return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        }

        function formatTimeCenti(ms) {
            const totalSecs = Math.floor(ms / 1000);
            const secs = totalSecs % 60;
            const tenth = Math.floor((ms % 1000) / 100);
            if (totalSecs <= 10) return String(secs).padStart(2, '0') + '.' + tenth;
            const mins = Math.floor(totalSecs / 60);
            return mins + ':' + String(secs).padStart(2, '0') + '.' + tenth;
        }

        function startCentiLoop(remainingMs, ts) {
            cancelAnimationFrame(rafId);
            const clock = document.getElementById('pub-clock');
            function frame() {
                const rem = Math.max(remainingMs - (Date.now() - ts), 0);
                const totalSecs = Math.floor(rem / 1000);
                clock.textContent = formatTimeCenti(rem);
                clock.className = totalSecs > 10 ? 'clock centi-long' : 'clock';
                if (rem > 0) rafId = requestAnimationFrame(frame);
            }
            rafId = requestAnimationFrame(frame);
        }

        function stopCentiLoop() {
            cancelAnimationFrame(rafId);
            rafId = null;
        }

        function render(s) {
            document.getElementById('no-signal').style.display = 'none';

            // ── Overlay descanso ──
            const dsOverlay = document.getElementById('descanso-overlay');
            const dsLabel = document.getElementById('ds-ov-label');
            const dsClock = document.getElementById('ds-ov-clock');

            if (!s.descanso || s.descanso === 'waiting') {
                dsOverlay.classList.remove('show');
            } else {
                dsOverlay.classList.add('show');
                dsLabel.textContent = 'Descanso'; dsLabel.classList.add('active');
                dsClock.textContent = s.descanso; dsClock.classList.add('active');
            }

            // ── Activity time — shown under the active fighter ──
            const tagRed = document.getElementById('activity-tag-red');
            const tagBlue = document.getElementById('activity-tag-blue');
            const clockRed = document.getElementById('act-ov-clock-red');
            const clockBlue = document.getElementById('act-ov-clock-blue');
            if (s.activity) {
                const rem = Math.max(s.activity.remaining, 0);
                const timeStr = formatPubTime(rem);
                const paused = s.activity.paused ? ' paused' : '';
                if (s.activity.side === 'red') {
                    tagRed.className = 'activity-tag show' + paused;
                    clockRed.textContent = timeStr;
                    tagBlue.className = 'activity-tag';
                } else {
                    tagBlue.className = 'activity-tag show' + paused;
                    clockBlue.textContent = timeStr;
                    tagRed.className = 'activity-tag';
                }
            } else {
                tagRed.className = 'activity-tag';
                tagBlue.className = 'activity-tag';
            }


            // ── Scores ──
            const redEl = document.getElementById('pub-score-red');
            const blueEl = document.getElementById('pub-score-blue');
            if (s.red !== prevRed) {
                redEl.classList.remove('bump'); void redEl.offsetWidth;
                redEl.classList.add('bump');
                setTimeout(() => redEl.classList.remove('bump'), 200);
                prevRed = s.red;
            }
            if (s.blue !== prevBlue) {
                blueEl.classList.remove('bump'); void blueEl.offsetWidth;
                blueEl.classList.add('bump');
                setTimeout(() => blueEl.classList.remove('bump'), 200);
                prevBlue = s.blue;
            }
            redEl.textContent = s.red;
            blueEl.textContent = s.blue;




            // Nombres
            const nameRedEl = document.getElementById('pub-name-red');
            if (nameRedEl) nameRedEl.textContent = s.nameRed || 'Rojo';

            const nameBlueEl = document.getElementById('pub-name-blue');
            if (nameBlueEl) nameBlueEl.textContent = s.nameBlue || 'Azul';

            // Reloj
            const clock = document.getElementById('pub-clock');
            const atHalftime = !s.running && s.remInPeriod != null && s.remInPeriod <= 0 && (s.remainingSeconds > 0 || s.matchFinished || s.matchEnded);
            if (s.remainingMs != null && s.running) {
                startCentiLoop(s.remainingMs, s.ts);
                clock.className = 'clock';
            } else if (s.remainingMs != null && !s.running) {
                stopCentiLoop();
                clock.textContent = formatTimeCenti(s.remainingMs);
                const totalSecs = Math.floor(s.remainingMs / 1000);
                clock.className = totalSecs > 10 ? 'clock centi-long paused' : 'clock paused';
            } else {
                stopCentiLoop();
                clock.textContent = s.time;
                if (atHalftime) {
                    clock.className = 'clock halftime';
                } else if (s.running) {
                    clock.className = 'clock running';
                } else {
                    clock.className = 'clock paused';
                }
            }

            // Dot
            document.getElementById('pub-dot').className = 'status-dot' + (s.running ? ' running' : '');

            // Periodo
            document.getElementById('pub-period').textContent = s.periodLabel || 'Periodo 1';

            // Advertencias
            ['red', 'blue'].forEach(side => {
                const arr = side === 'red' ? s.warnsRed : s.warnsBlue;
                document.getElementById('pub-warns-' + side)
                    .querySelectorAll('.warn-circle')
                    .forEach((d, i) => d.classList.toggle('on', arr && arr[i]));
            });
        }

        function poll() {
            try {
                const raw = localStorage.getItem('scoreboard_state');
                if (!raw) return;
                const s = JSON.parse(raw);
                if (s.ts !== lastTs) { lastTs = s.ts; render(s); }
            } catch (e) { }
        }

        setInterval(poll, 150);
        window.addEventListener('storage', e => {
            if (e.key === 'scoreboard_state') try { render(JSON.parse(e.newValue)); } catch (e2) { }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => { });
                document.getElementById('icon-expand').style.display = 'none';
                document.getElementById('icon-compress').style.display = '';
            } else {
                document.exitFullscreen().catch(() => { });
                document.getElementById('icon-expand').style.display = '';
                document.getElementById('icon-compress').style.display = 'none';
            }
        }
        document.addEventListener('keydown', e => { if (e.code === 'KeyF') toggleFullscreen(); });
    </script>
</body>

</html>
