<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scoreboard - Operador</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --red: #ff003c;
            --red-bg: #000000;
            --blue: #0088ff;
            --blue-bg: #000000;
            --center: #000000;
            --surface: #000000;
            --surface2: #080808;
            --border: #1a1a1a;
            --text: #ffffff;
            --muted: #ffffff;
            --green: #00ff5b;
            --green-bg: #000000;
            --bg: #000000;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 16px;
            gap: 10px;
        }

        /* ── TOP BAR ── */
        .top-bar {
            width: 100%;
            max-width: 960px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: var(--surface);
            border-radius: 6px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }

        .top-bar-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .top-bar-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .top-btn {
            font-size: 11px;
            color: var(--text);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 4px;
            background: var(--surface);
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .top-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        /* ── NAMES ── */
        .names-row {
            width: 100%;
            max-width: 960px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .name-input-wrap {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .name-input-wrap label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .name-input-wrap.r label {
            color: var(--red);
            text-shadow: 0 0 8px rgba(255, 0, 60, 0.4);
        }

        .name-input-wrap.b label {
            color: var(--blue);
            text-shadow: 0 0 8px rgba(0, 225, 255, 0.4);
        }

        .name-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 14px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }

        .name-input.r:focus {
            border-color: var(--red);
            box-shadow: 0 0 16px rgba(255, 0, 60, 0.4);
        }

        .name-input.b:focus {
            border-color: var(--blue);
            box-shadow: 0 0 16px rgba(0, 225, 255, 0.4);
        }

        .name-input::placeholder {
            color: var(--muted);
            font-weight: 500;
        }

        /* ── ALERTS ── */
        .alert-bar {
            display: none;
            width: 100%;
            max-width: 960px;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .alert-bar.show {
            display: block;
        }

        .alert-bar.match-end {
            background: #000;
            border: 1px solid var(--red);
            color: var(--red);
            box-shadow: 0 0 16px rgba(255, 0, 60, 0.3);
            animation: pulse-a 0.8s infinite;
        }

        .alert-bar.finished {
            background: #000;
            border: 1px solid var(--green);
            color: var(--green);
            box-shadow: 0 0 16px rgba(0, 255, 91, 0.3);
        }

        @keyframes pulse-a {

            0%,
            100% {
                box-shadow: 0 0 16px rgba(255, 234, 0, 0.2)
            }

            50% {
                box-shadow: 0 0 24px rgba(255, 234, 0, 0.6)
            }
        }

        /* ── SCOREBOARD ── */
        .scoreboard {
            width: 100%;
            max-width: 960px;
            display: grid;
            grid-template-columns: 1fr 280px 1fr;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .side {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .side.red {
            border-right: 1px solid var(--border);
            border-top: 2px solid var(--red);
        }

        .side.blue {
            border-left: 1px solid var(--border);
            border-top: 2px solid var(--blue);
        }

        .corner-label {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .side.red .corner-label {
            color: var(--red);
        }

        .side.blue .corner-label {
            color: var(--blue);
        }

        .score-display {
            width: 190px;
            height: 150px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: 'Roboto Mono', monospace;
            font-size: 110px;
            line-height: 0.85;
            font-weight: 900;
            color: #fff;
            user-select: none;
            transition: transform 0.12s ease, box-shadow 0.3s, background 0.3s;
        }

        .score-display.bump {
            transform: scale(1.12);
        }

        .side.red .score-display {
            background: rgba(255, 0, 60, 0.30);
            border-color: #ff003c;
            box-shadow: inset 0 0 80px rgba(255, 0, 60, 0.45), 0 0 60px rgba(255, 0, 60, 0.45);
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
        }

        .side.blue .score-display {
            background: rgba(0, 136, 255, 0.30);
            border-color: #0088ff;
            box-shadow: inset 0 0 80px rgba(0, 136, 255, 0.45), 0 0 60px rgba(0, 136, 255, 0.45);
            text-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
        }

        /* Botones de puntos */
        .point-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 7px;
            width: 100%;
        }

        .pt-btn {
            height: 52px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-family: 'Roboto Mono', monospace;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #000;
            color: #fff;
        }

        .side.red .pt-btn {
            color: var(--red);
            background: rgba(255, 0, 60, 0.08);
            border-color: rgba(255, 0, 60, 0.5);
        }

        .side.red .pt-btn:hover:not(:disabled) {
            background: var(--red);
            color: #000;
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.7);
        }

        .side.red .pt-btn:active:not(:disabled) {
            transform: translateY(2px);
        }

        .side.blue .pt-btn {
            color: var(--blue);
            background: rgba(0, 136, 255, 0.08);
            border-color: rgba(0, 136, 255, 0.5);
        }

        .side.blue .pt-btn:hover:not(:disabled) {
            background: var(--blue);
            color: #000;
            border-color: var(--blue);
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.7);
        }

        .side.blue .pt-btn:active:not(:disabled) {
            transform: translateY(2px);
        }

        .warns-label {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .warnings {
            display: flex;
            gap: 10px;
        }

        .warn-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
        }

        .side.red .warn-dot {
            border-color: rgba(255, 0, 60, 0.5);
        }

        .side.red .warn-dot:hover {
            border-color: var(--red);
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.4);
        }

        .side.red .warn-dot.active {
            background: var(--red);
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.7);
        }

        .side.blue .warn-dot {
            border-color: rgba(0, 136, 255, 0.5);
        }

        .side.blue .warn-dot:hover {
            border-color: var(--blue);
            box-shadow: 0 0 10px rgba(0, 136, 255, 0.4);
        }

        .side.blue .warn-dot.active {
            background: var(--blue);
            border-color: var(--blue);
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.7);
        }

        /* ── CENTER ── */
        .center {
            background: var(--center);
            padding: 20px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .clock-display {
            font-family: 'Roboto Mono', monospace;
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
            text-align: center;
            border-radius: 6px;
            padding: 4px 12px;
        }

        .clock-display.paused {
            color: var(--text);
        }

        .clock-display.running {
            color: var(--text);
        }

        .clock-display.danger {
            background: #ffffff;
            color: #000000;
        }

        .btn-edit-time {
            margin-top: 4px;
            margin-bottom: 2px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-edit-time:hover {
            border-color: #555;
            color: #fff;
            background: #111;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .time-selector {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .time-btn {
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            transition: all 0.2s;
        }

        .time-btn:hover {
            border-color: #fff;
            color: #000;
            background: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .time-btn.active {
            background: transparent;
            color: #ffea00;
            border-color: #ffea00;
            box-shadow: 0 0 12px rgba(255, 234, 0, 0.3);
        }

        .time-adjust {
            display: none;
            gap: 5px;
            justify-content: center;
        }

        .adj-btn {
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 234, 0, 0.35);
            background: transparent;
            color: #ffea00;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            transition: all 0.2s;
        }

        .adj-btn:hover {
            background: #ffea00;
            color: #000;
            border-color: #ffea00;
            box-shadow: 0 0 10px rgba(255, 234, 0, 0.4);
        }

        .time-custom {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .time-custom input {
            width: 68px;
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            font-size: 13px;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        .time-custom input:focus {
            border-color: #ffea00;
            box-shadow: 0 0 12px rgba(255, 234, 0, 0.3);
        }

        .set-btn {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .set-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .time-extend {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .ext-btn {
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 91, 0.4);
            background: transparent;
            color: var(--green);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            transition: all 0.2s;
        }

        .ext-btn:hover {
            background: var(--green);
            color: #000;
            border-color: var(--green);
            box-shadow: 0 0 16px rgba(0, 255, 91, 0.5);
        }

        .ext-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }



        .history-panel {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 24px 20px;
            border-top: 1px solid var(--border);
            align-items: center;
            background: #000;
        }

        .history-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
        }

        .history-track {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 40px;
            width: 100%;
        }

        .h-chip {
            width: 38px;
            height: 38px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            font-family: 'Roboto Mono', monospace;
            background: transparent;
        }

        .h-chip.r {
            color: var(--red);
            border: 1px solid rgba(255, 0, 60, 0.4);
            background: rgba(255, 0, 60, 0.05);
        }

        .h-chip.b {
            color: var(--blue);
            border: 1px solid rgba(0, 136, 255, 0.4);
            background: rgba(0, 136, 255, 0.05);
        }

        .h-chip.last.r {
            background: var(--red);
            color: #000 !important;
            border-color: var(--red);
            box-shadow: 0 0 16px rgba(255, 0, 60, 0.6);
        }

        .h-chip.last.b {
            background: var(--blue);
            color: #000 !important;
            border-color: var(--blue);
            box-shadow: 0 0 16px rgba(0, 136, 255, 0.6);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            margin-top: auto;
        }

        .btn-start {
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            border: 1px solid var(--green);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: rgba(0, 255, 91, 0.12);
            color: var(--green);
        }

        .btn-start:not([style*="opacity"]):not([style*="cursor: default"]):not(.running):hover {
            background: var(--green);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 91, 0.5);
        }

        .btn-start.running {
            border-color: var(--red);
            background: rgba(255, 0, 60, 0.12);
            color: var(--red);
        }

        .btn-start:not([style*="opacity"]):not([style*="cursor: default"]).running:hover {
            background: var(--red);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.5);
        }

        .btn-start.waiting {
            border-color: #ffea00;
            color: #ffea00;
            animation: pulse-wait 1s infinite;
        }

        @keyframes pulse-wait {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(255, 234, 0, 0.2)
            }

            50% {
                box-shadow: 0 0 20px rgba(255, 234, 0, 0.5)
            }
        }

        .ctrl-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-ctrl {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-ctrl:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .btn-ctrl.danger {
            color: var(--red);
            border-color: rgba(255, 0, 60, 0.4);
        }

        .btn-ctrl.danger:hover {
            background: var(--red);
            color: #000;
            border-color: var(--red);
            box-shadow: 0 0 16px rgba(255, 0, 60, 0.5);
        }

        .spacebar-hint {
            font-size: 9px;
            color: var(--muted);
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── DESCANSO PANEL ── */
        .descanso-panel {
            width: 100%;
            max-width: 960px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            transition: all 0.3s;
        }

        .descanso-panel.active {
            border-color: #fff;
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.15);
        }

        .descanso-label {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--muted);
            white-space: nowrap;
        }

        .descanso-panel.active .descanso-label {
            color: #fff;
        }

        .descanso-clock {
            font-family: 'Roboto Mono', monospace;
            font-size: 34px;
            font-weight: 900;
            color: var(--muted);
            letter-spacing: 2px;
            min-width: 90px;
            transition: color 0.3s;
        }

        .descanso-clock.running {
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .descanso-clock.danger {
            color: var(--red);
        }

        .descanso-presets {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .ds-preset {
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            transition: all 0.2s;
        }

        .ds-preset:not(:disabled):hover {
            border-color: #fff;
            color: #000;
            background: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .ds-preset.active {
            border-color: #fff;
            background: #fff;
            color: #000;
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
        }

        .ds-custom {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .ds-custom input {
            width: 62px;
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        .ds-custom input:focus {
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
        }

        .ds-set {
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .ds-set:not(:disabled):hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .btn-descanso {
            padding: 10px 20px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: transparent;
            color: #fff;
            transition: all 0.2s;
            margin-left: auto;
            white-space: nowrap;
        }

        .btn-descanso:not(:disabled):hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
        }

        .btn-descanso.running {
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* ── ACTIVITY TIME ── */
        .btn-activity {
            width: 100%;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255, 170, 0, 0.4);
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: transparent;
            color: #ffaa00;
            transition: all 0.2s;
        }

        .btn-activity:not(:disabled):hover {
            background: #ffaa00;
            color: #000;
            border-color: #ffaa00;
        }

        .btn-activity.active {
            background: #ffaa00;
            color: #000;
            border-color: #ffaa00;
            box-shadow: 0 0 16px rgba(255, 170, 0, 0.5);
        }

        .btn-activity.danger {
            background: #ffaa00;
            color: #000;
            border-color: #ffaa00;
            box-shadow: 0 0 16px rgba(255, 170, 0, 0.5);
        }

        /* ── INSTRUCTIONS ── */
        .instructions {
            width: 100%;
            max-width: 960px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px 24px;
        }

        .instructions h4 {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .instructions ul {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 24px;
        }

        .instructions ul li {
            font-size: 11px;
            color: var(--text);
            display: flex;
            gap: 12px;
            align-items: flex-start;
            font-weight: 500;
        }

        .instructions ul li span.key {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 10px;
            font-family: 'Roboto Mono', monospace;
            color: var(--text);
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        @media (max-width: 900px) {
            .scoreboard {
                grid-template-columns: 1fr 220px 1fr;
            }

            .score-display {
                width: 150px;
                height: 118px;
                font-size: 88px;
            }

            .clock-display {
                font-size: 56px;
            }

            .pt-btn {
                height: 44px;
                font-size: 17px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 10px 10px;
                gap: 8px;
            }

            .scoreboard {
                grid-template-columns: 1fr;
            }

            .center {
                border: 1px solid var(--border);
                border-radius: 8px;
                width: 100%;
                order: -1;
            }

            .side.red,
            .side.blue {
                border: 1px solid var(--border);
                border-radius: 8px;
                border-top: 2px solid;
            }

            .side {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                padding: 14px 12px;
                gap: 10px;
            }

            .score-display {
                width: 120px;
                height: 96px;
                font-size: 70px;
            }

            .point-buttons {
                flex: 1;
                min-width: 160px;
            }

            .pt-btn {
                height: 40px;
                font-size: 15px;
            }

            .clock-display {
                font-size: 48px;
            }

            .instructions ul {
                grid-template-columns: 1fr;
            }

            .names-row {
                grid-template-columns: 1fr;
            }

            .descanso-panel {
                flex-direction: column;
                align-items: flex-start;
            }

            .btn-descanso {
                margin-left: 0;
                width: 100%;
            }

            .btn-activity {
                font-size: 9px;
                padding: 6px 8px;
            }
        }

        @media (max-width: 400px) {
            .score-display {
                width: 100px;
                height: 80px;
                font-size: 58px;
            }

            .clock-display {
                font-size: 38px;
            }

            .pt-btn {
                height: 36px;
                font-size: 13px;
            }

            .top-btn {
                font-size: 9px;
                padding: 5px 10px;
            }
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <span class="top-bar-title">Vista del Operador</span>
        <div class="top-bar-actions">
            <a class="top-btn" href="scoreboard_publico.html" target="_blank">Abrir pantalla publica</a>
        </div>
    </div>






    <div class="scoreboard">
        <div class="side red">
            <div class="score-display" id="score-red">0</div>
            <div class="point-buttons">
                <button class="pt-btn" onclick="addPoints('red',1)">1</button>
                <button class="pt-btn" onclick="addPoints('red',2)">2</button>
                <button class="pt-btn" onclick="addPoints('red',3)">3</button>
                <button class="pt-btn" onclick="addPoints('red',4)">4</button>
                <button class="pt-btn" onclick="addPoints('red',5)">5</button>
            </div>
            <span class="warns-label">Amonestaciones</span>
            <div class="warnings" id="warns-red">
                <div class="warn-dot" onclick="toggleWarn('red',0)"></div>
                <div class="warn-dot" onclick="toggleWarn('red',1)"></div>
                <div class="warn-dot" onclick="toggleWarn('red',2)"></div>
            </div>
            <button class="btn-activity" id="act-red" onclick="toggleActivity('red')" disabled>Actividad</button>
        </div>

        <div class="center">
            <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="clock-display paused" id="clock">6:00</div>
                <div class="time-adjust" id="time-adjust">
                    <button class="adj-btn" onclick="adjustTime(-1)">−</button>
                    <button class="adj-btn" onclick="adjustTime(1)">+</button>
                </div>
            </div>
            <div class="time-selector">
                <button class="time-btn active" onclick="setTime(360,false,this)">6:00</button>
                <button class="time-btn" onclick="setTime(240,false,this)">4:00</button>
                <button class="time-btn" onclick="setTime(180,true,this)">3:00</button>
            </div>



            <div class="controls">
                <button class="btn-start" id="btn-ss" onclick="handleMainButton()">Iniciar</button>
                <div class="ctrl-row">
                    <button class="btn-ctrl" onclick="undoLast()">Deshacer ultimo</button>
                    <button class="btn-ctrl danger" onclick="resetAll()">Reiniciar todo</button>
                </div>
            </div>

        </div>

        <div class="side blue">
            <div class="score-display" id="score-blue">0</div>
            <div class="point-buttons">
                <button class="pt-btn" onclick="addPoints('blue',1)">1</button>
                <button class="pt-btn" onclick="addPoints('blue',2)">2</button>
                <button class="pt-btn" onclick="addPoints('blue',3)">3</button>
                <button class="pt-btn" onclick="addPoints('blue',4)">4</button>
                <button class="pt-btn" onclick="addPoints('blue',5)">5</button>
            </div>
            <span class="warns-label">Amonestaciones</span>
            <div class="warnings" id="warns-blue">
                <div class="warn-dot" onclick="toggleWarn('blue',0)"></div>
                <div class="warn-dot" onclick="toggleWarn('blue',1)"></div>
                <div class="warn-dot" onclick="toggleWarn('blue',2)"></div>
            </div>
            <button class="btn-activity" id="act-blue" onclick="toggleActivity('blue')" disabled>Actividad</button>
        </div>

        <!-- ── HISTORY PANEL ── -->
        <div class="history-panel">
            <span class="history-label">Historial de Puntos</span>
            <div class="history-track" id="history"></div>
        </div>
    </div>

    <!-- DESCANSO -->
    <div class="descanso-panel" id="descanso-panel">
        <span class="descanso-label">Descanso</span>
        <div class="descanso-clock" id="ds-clock">0:00</div>
        <button class="btn-descanso" id="btn-descanso" onclick="toggleDescanso()">Iniciar descanso</button>
    </div>



    <script>
        // ── ESTADO ──
        let state = {
            red: 0, blue: 0,
            warnsRed: [false, false, false],
            warnsBlue: [false, false, false],
            periodDuration: 180,
            remainingSeconds: 360,
            selectedDuration: 360,
            running: false,
            matchEnded: false,
            matchFinished: false,
            matchNumber: 1,
            started: false,
            period: 1,
            history: []
        };

        let timerInterval = null;
        let timerEpoch = 0, timerBase = 0;
        let frozenMs = null;

        // Estado descanso
        let ds = { total: 30, elapsed: 0, running: false };
        let dsInterval = null;
        let dsEpoch = 0, dsBase = 0;

        // Estado activity time
        const ACTIVITY_DURATION = 30;
        let activity = { side: null, elapsed: 0, running: false, paused: false };
        let actInterval = null;
        let actEpoch = 0, actBase = 0;

        // ── AUDIO ──
        function playBell() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [880, 1108].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(i === 0 ? 0.6 : 0.35, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.5);
                    osc.start(ctx.currentTime + i * 0.03);
                    osc.stop(ctx.currentTime + 2.5);
                });
            } catch (e) { }
        }

        // ── PUNTOS ──
        function addPoints(side, pts) {
            state[side] += pts;
            state.history.push({ side, pts });
            const el = document.getElementById('score-' + side);
            el.classList.add('bump');
            setTimeout(() => el.classList.remove('bump'), 150);
            update();
        }

        function undoLast() {
            if (!state.history.length) return;
            const last = state.history.pop();
            state[last.side] = Math.max(0, state[last.side] - last.pts);
            update();
        }

        // ── ADVERTENCIAS ──
        function toggleWarn(side, idx) {
            const arr = side === 'red' ? state.warnsRed : state.warnsBlue;
            arr[idx] = !arr[idx];
            update();
        }

        // ── BOTON PRINCIPAL (contextual) ──
        function handleMainButton() {
            toggleTimer();
        }

        // ── TIMER COMBATE ──
        function toggleTimer() {
            if (state.running) {
                clearInterval(timerInterval);
                state.running = false;
                const pEnd = state.period === 1 ? state.periodDuration : 0;
                const remAtPause = state.remainingSeconds - pEnd;
                if (remAtPause <= 10 && remAtPause > 0) {
                    frozenMs = Math.max(timerBase * 1000 - (Date.now() - timerEpoch), pEnd * 1000);
                } else {
                    frozenMs = null;
                }
                // Pausar activity si estaba corriendo
                if (activity.running) {
                    clearInterval(actInterval);
                    activity.running = false;
                    activity.paused = true;
                    updateActivity();
                    syncPublic();
                }
            } else {
                if (state.remainingSeconds <= 0) return;
                if (state.matchFinished) state.matchFinished = false;
                timerBase = state.remainingSeconds;
                timerEpoch = Date.now();
                frozenMs = null;
                state.running = true;
                state.started = true;
                timerInterval = setInterval(tick, 50);
                // Reanudar activity si estaba pausado
                if (activity.paused) {
                    actBase = activity.elapsed;
                    actEpoch = Date.now();
                    activity.running = true;
                    activity.paused = false;
                    actInterval = setInterval(tickActivity, 250);
                    updateActivity();
                    syncPublic();
                }
            }
            update();
        }

        function tick() {
            const secsElapsed = Math.floor((Date.now() - timerEpoch) / 1000);
            const next = Math.max(timerBase - secsElapsed, 0);
            if (next === state.remainingSeconds) {
                const periodEnd = state.period === 1 ? state.periodDuration : 0;
                const rem = next - periodEnd;
                if (rem <= 10 && rem > 0 && state.running) {
                    const remainingMs = Math.max(timerBase * 1000 - (Date.now() - timerEpoch), periodEnd * 1000);
                    document.getElementById('clock').textContent = formatTimeCenti(remainingMs);
                }
                return;
            }
            state.remainingSeconds = next;
            const periodEnd = state.period === 1 ? state.periodDuration : 0;
            if (state.remainingSeconds <= periodEnd) {
                state.remainingSeconds = periodEnd;
                clearInterval(timerInterval);
                state.running = false;
                cancelActivity();
                if (state.period === 2) {
                    state.matchFinished = true;
                    state.matchEnded = false;
                } else {
                    state.matchEnded = true;
                    state.matchFinished = false;
                }
            }
            update();
        }

        function setTime(totalSeconds, noBreak, btn) {
            if (state.started) return;
            state.selectedDuration = totalSeconds;
            state.periodDuration = noBreak ? 0 : Math.floor(totalSeconds / 2);
            state.remainingSeconds = totalSeconds;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            update();
        }


        function adjustTime(delta) {
            if (state.running || !state.started || state.matchFinished) return;
            const periodEnd = state.period === 1 ? state.periodDuration : 0;
            const min = state.matchEnded ? periodEnd : periodEnd + 1;
            state.remainingSeconds = Math.max(min, Math.min(state.selectedDuration, state.remainingSeconds + delta));
            timerBase = state.remainingSeconds;
            frozenMs = null;
            update();
        }

        // Auto-formato mientras escribe: inserta ':' automaticamente
        // Ej: "130" → "1:30", "0015" → "00:15"
        function maskTime(input) {
            const cursor = input.selectionStart;
            let digits = input.value.replace(/\D/g, '').substring(0, 4);
            if (digits.length === 0) { input.value = ''; return; }
            if (digits.length <= 2) {
                input.value = digits;
            } else {
                // los ultimos 2 digitos son segundos
                const mins = digits.substring(0, digits.length - 2);
                const secs = digits.substring(digits.length - 2);
                input.value = mins + ':' + secs;
            }
            // mantener cursor al final
            const len = input.value.length;
            input.setSelectionRange(len, len);
        }

        // Parsea mm:ss, MMSS (4 digitos) o segundos sueltos
        function parseSecs(val) {
            val = val.trim();
            if (val.includes(':')) {
                const p = val.split(':');
                return parseInt(p[0]) * 60 + parseInt(p[1]);
            }
            if (val.length === 4 && /^\d+$/.test(val)) {
                // formato MMSS: 0015 = 00 min 15 sec
                return parseInt(val.substring(0, 2)) * 60 + parseInt(val.substring(2));
            }
            if (val.length === 3 && /^\d+$/.test(val)) {
                // formato MSS: 115 = 1 min 15 sec
                return parseInt(val.substring(0, 1)) * 60 + parseInt(val.substring(1));
            }
            return parseInt(val); // solo segundos
        }



        function promptEditTime() {
            if (state.running || state.matchFinished) return;
            const res = prompt('Duracion total del combate (M:SS):', formatTime(state.periodDuration * 2));
            if (!res) return;
            const secs = parseSecs(res);
            if (!isNaN(secs) && secs > 0) {
                state.periodDuration = Math.floor(secs / 2);
                if (!state.started) state.remainingSeconds = secs;
                update();
            }
        }



        function resetAll() {
            if (!confirm('Reiniciar el encuentro?')) return;
            clearInterval(timerInterval); clearInterval(dsInterval);
            state.matchNumber++;
            state.red = 0; state.blue = 0;
            state.warnsRed = [false, false, false]; state.warnsBlue = [false, false, false];
            state.remainingSeconds = state.selectedDuration;
            state.running = false; state.matchEnded = false; state.matchFinished = false; state.started = false;
            state.period = 1;
            state.history = [];
            ds.running = false; ds.elapsed = 0;
            frozenMs = null;
            updateDescanso();
            update();
        }

        function formatTime(s) {
            return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        }

        function formatTimeCenti(ms) {
            const totalSecs = Math.floor(ms / 1000);
            const secs = totalSecs % 60;
            const tenth = Math.floor((ms % 1000) / 100);
            if (totalSecs <= 10) return String(secs).padStart(2, '0') + '.' + tenth;
            const mins = Math.floor(totalSecs / 60);
            return mins + ':' + String(secs).padStart(2, '0') + '.' + tenth;
        }

        // ── RENDER ──
        function update() {
            document.getElementById('score-red').textContent = state.red;
            document.getElementById('score-blue').textContent = state.blue;

            const diff = Math.abs(state.red - state.blue);
            const tied = state.red === state.blue;

            document.getElementById('alert-match-end') && document.getElementById('alert-match-end').classList.toggle('show', false);



            const clock = document.getElementById('clock');
            const periodEnd = state.period === 1 ? state.periodDuration : 0;
            const remInPeriod = state.remainingSeconds - periodEnd;
            const showCenti = remInPeriod <= 10 && remInPeriod > 0;
            if (showCenti) {
                const remainingMs = state.running
                    ? Math.max(timerBase * 1000 - (Date.now() - timerEpoch), periodEnd * 1000)
                    : (frozenMs != null ? frozenMs : state.remainingSeconds * 1000);
                clock.textContent = formatTimeCenti(remainingMs);
                clock.style.fontSize = '48px';
            } else {
                clock.textContent = formatTime(state.remainingSeconds);
                clock.style.fontSize = '';
            }
            clock.className = 'clock-display';
            if (remInPeriod <= 0 && state.started) clock.classList.add('danger');
            else if (state.running) clock.classList.add('running');
            else clock.classList.add('paused');

            const btn = document.getElementById('btn-ss');
            if (state.matchFinished) {
                btn.style.display = '';
                btn.style.opacity = ''; btn.style.cursor = '';
                btn.textContent = 'Iniciar';
                btn.className = 'btn-start';
            } else if (state.matchEnded) {
                btn.style.display = '';
                btn.style.opacity = ''; btn.style.cursor = '';
                btn.textContent = state.running ? 'Pausar' : 'Iniciar';
                btn.className = 'btn-start' + (state.running ? ' running' : '');
            } else {
                btn.style.display = '';
                btn.style.opacity = ''; btn.style.cursor = '';
                btn.textContent = state.running ? 'Pausar' : (state.remainingSeconds <= 0 ? 'Fin' : 'Iniciar');
                btn.className = 'btn-start' + (state.running ? ' running' : '');
            }



            const undoBtn = document.querySelector('.btn-ctrl:not(.danger)');
            if (undoBtn) {
                undoBtn.disabled = false;
                undoBtn.style.opacity = '';
                undoBtn.style.cursor = '';
                undoBtn.title = !state.history.length ? 'Sin puntos para deshacer' : 'Deshacer ultimo punto (Z)';
            }

            document.querySelectorAll('.pt-btn').forEach(b => {
                b.disabled = false;
                b.style.opacity = '';
                b.style.cursor = '';
                b.title = '';
            });

            // Selector de tiempo: bloqueado si el combate ya arranco
            const matchStarted = state.started || state.matchEnded || state.matchFinished;
            const timeOpacity = matchStarted ? '0.2' : '';
            const timeCursor = matchStarted ? 'not-allowed' : '';
            document.querySelectorAll('.time-btn').forEach(b => {
                b.disabled = matchStarted;
                b.style.opacity = timeOpacity;
                b.style.cursor = timeCursor;
            });






            ['red', 'blue'].forEach(side => {
                const arr = side === 'red' ? state.warnsRed : state.warnsBlue;
                document.getElementById('warns-' + side).querySelectorAll('.warn-dot')
                    .forEach((d, i) => d.classList.toggle('active', arr[i]));
            });

            const track = document.getElementById('history');
            track.innerHTML = '';
            state.history.slice(-24).forEach((item, i, arr) => {
                const chip = document.createElement('div');
                chip.className = 'h-chip ' + (item.side === 'red' ? 'r' : 'b');
                if (i === arr.length - 1) chip.classList.add('last');
                chip.textContent = item.pts;
                track.appendChild(chip);
            });

            const adjustRow = document.getElementById('time-adjust');
            if (adjustRow) {
                const canAdjust = state.started && !state.running && !state.matchFinished;
                adjustRow.style.display = canAdjust ? 'flex' : 'none';
            }

            syncPublic();
            updateDescanso();
            updateActivity();
        }


        // ── ACTIVITY TIME ──
        function toggleActivity(side) {
            if (!state.started || state.matchEnded || state.matchFinished) return;
            if ((activity.running || activity.paused) && activity.side !== side) return;
            if (activity.running || activity.paused) {
                cancelActivity();
            } else {
                activity.side = side;
                activity.elapsed = 0;
                actBase = 0;
                if (state.running) {
                    actEpoch = Date.now();
                    activity.running = true;
                    actInterval = setInterval(tickActivity, 250);
                } else {
                    // clock paused — queue activity in paused state
                    activity.paused = true;
                }
            }
            updateActivity();
            syncPublic();
        }

        function cancelActivity() {
            clearInterval(actInterval);
            activity.running = false;
            activity.paused = false;
            activity.side = null;
            activity.elapsed = 0;
            updateActivity();
            syncPublic();
        }

        function tickActivity() {
            const elapsed = actBase + Math.floor((Date.now() - actEpoch) / 1000);
            const next = Math.min(elapsed, ACTIVITY_DURATION);
            if (next === activity.elapsed) return;
            activity.elapsed = next;
            updateActivity();
            syncPublic();
            if (activity.elapsed >= ACTIVITY_DURATION) {
                clearInterval(actInterval);
                activity.running = false;
                updateActivity();
                syncPublic();
                setTimeout(cancelActivity, 5000);
            }
        }

        function updateActivity() {
            const remaining = ACTIVITY_DURATION - activity.elapsed;
            const canActivate = state.started && !state.matchEnded && !state.matchFinished;
            ['red', 'blue'].forEach(side => {
                const btn = document.getElementById('act-' + side);
                if (!btn) return;
                btn.disabled = false;
                btn.style.opacity = '';
                btn.style.cursor = '';
                if (activity.running && activity.side === side) {
                    btn.textContent = '▶ ' + formatTime(remaining);
                    btn.className = 'btn-activity active';
                } else if (activity.paused && activity.side === side) {
                    btn.textContent = '⏸ ' + formatTime(remaining);
                    btn.className = 'btn-activity active';
                } else if (activity.running || activity.paused) {
                    btn.textContent = 'Actividad';
                    btn.className = 'btn-activity';
                    btn.disabled = true;
                    btn.style.opacity = '0.25';
                    btn.style.cursor = 'not-allowed';
                } else if (!canActivate) {
                    btn.textContent = 'Actividad';
                    btn.className = 'btn-activity';
                    btn.disabled = true;
                    btn.style.opacity = '0.25';
                    btn.style.cursor = 'not-allowed';
                } else {
                    btn.textContent = 'Actividad';
                    btn.className = 'btn-activity';
                }
            });
        }

        function toggleDescanso() {
            if (state.matchFinished || ds.running) return;
            if (!state.matchEnded) return;
            if (ds.elapsed >= ds.total) ds.elapsed = 0;
            dsBase = ds.elapsed;
            dsEpoch = Date.now();
            ds.running = true;
            dsInterval = setInterval(tickDescanso, 250);
            updateDescanso();
            update();
        }

        function tickDescanso() {
            const elapsed = dsBase + Math.floor((Date.now() - dsEpoch) / 1000);
            const next = Math.min(elapsed, ds.total);
            if (next === ds.elapsed) return;
            ds.elapsed = next;
            updateDescanso();
            if (ds.elapsed >= ds.total) {
                clearInterval(dsInterval);
                ds.running = false;
                if (state.period < 2) {
                    state.period++;
                }
                state.matchEnded = false;
                // remainingSeconds already at periodDuration where period 1 stopped
                state.running = false;
                state.started = false;
                updateDescanso();
                update();
            }
        }

        function updateDescanso() {
            const clock = document.getElementById('ds-clock');
            const dsRemaining = ds.total - ds.elapsed;
            clock.textContent = formatTime(dsRemaining);
            clock.className = 'descanso-clock';
            if (dsRemaining <= 0) clock.classList.add('danger');
            else if (ds.running) clock.classList.add('running');

            const btn = document.getElementById('btn-descanso');
            const panel = document.getElementById('descanso-panel');
            const canBreak = state.matchEnded && !state.matchFinished;

            if (ds.running) {
                btn.textContent = 'Descanso en curso';
                btn.className = 'btn-descanso running';
                btn.disabled = true;
                btn.style.opacity = '';
                btn.style.cursor = 'not-allowed';
            } else if (canBreak) {
                btn.textContent = 'Iniciar descanso';
                btn.className = 'btn-descanso';
                btn.disabled = false;
                btn.style.opacity = '';
                btn.style.cursor = '';
            } else {
                btn.textContent = 'Iniciar descanso';
                btn.className = 'btn-descanso';
                btn.disabled = true;
                btn.style.opacity = '0.2';
                btn.style.cursor = 'not-allowed';
            }

            panel.classList.toggle('active', ds.running);
            syncPublic();
        }

        // ── SYNC PUBLICA ──
        function syncPublic() {
            const periodLabels = ['', 'Periodo 1', 'Periodo 2'];
            localStorage.setItem('scoreboard_state', JSON.stringify({
                red: state.red,
                blue: state.blue,
                nameRed: 'Rojo',
                nameBlue: 'Azul',
                time: formatTime(state.remainingSeconds),
                remainingSeconds: state.remainingSeconds,
                remInPeriod: state.remainingSeconds - (state.period === 1 ? state.periodDuration : 0),
                remainingMs: (() => {
                    const pEnd = state.period === 1 ? state.periodDuration : 0;
                    const rem = state.remainingSeconds - pEnd;
                    if (rem <= 10 && rem > 0) {
                        return state.running
                            ? Math.max(timerBase * 1000 - (Date.now() - timerEpoch), pEnd * 1000)
                            : (frozenMs != null ? frozenMs : state.remainingSeconds * 1000);
                    }
                    return null;
                })(),
                running: state.running,
                period: state.period,
                periodLabel: periodLabels[state.period] || 'Periodo 1',
                warnsRed: state.warnsRed,
                warnsBlue: state.warnsBlue,
                matchFinished: state.matchFinished,
                matchEnded: state.matchEnded,
                matchNumber: state.matchNumber,
                descanso: ds.running ? formatTime(ds.total - ds.elapsed) : (state.matchEnded ? 'waiting' : null),
                activity: (activity.running || activity.paused || activity.elapsed >= ACTIVITY_DURATION)
                    ? { side: activity.side, remaining: ACTIVITY_DURATION - activity.elapsed, expired: activity.elapsed >= ACTIVITY_DURATION, paused: activity.paused }
                    : null,
                ts: Date.now()
            }));
        }

        // ── TECLADO ──
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            switch (e.code) {
                case 'Space':
                    e.preventDefault();
                    if (!state.matchFinished) toggleTimer();
                    break;
                case 'KeyZ':
                    if (!state.matchEnded && !state.matchFinished) undoLast();
                    break;
                case 'KeyR': resetAll(); break;
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) return;
            if (state.running) tick();
            if (ds.running) tickDescanso();
        });

        updateDescanso();
        update();
    </script>
</body>

</html>
